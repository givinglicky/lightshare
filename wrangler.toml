name = "lightshare-api"
main = "workers/index.ts"
compatibility_date = "2024-01-01"

# 环境变量
[vars]
# 这些变量可以在 Cloudflare Dashboard 中设置

# 密钥（在 Cloudflare Dashboard 中设置）
[[secrets]]
JWT_SECRET = ""

# D1 数据库绑定
[[d1_databases]]
binding = "D1_DATABASE"
database_name = "lightshare-db"
database_id = "your-database-id-here"
